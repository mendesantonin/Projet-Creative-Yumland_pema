</header>

<main>

    <section class="section">
        <h2>Créer un compte</h2>

        <form action="#" method="post">

            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>

            <label for="email">Adresse e-mail</label>
            <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>

            <label for="telephone">Numéro de téléphone</label>
            <input type="tel" id="telephone" name="telephone" placeholder="06 12 34 56 78">

            <label for="adresse">Adresse de livraison</label>
            <textarea id="adresse" name="adresse" rows="3" placeholder="Rue, code postal, ville"></textarea>

            <label for="infos">Informations complémentaires</label>
            <textarea id="infos" name="infos" rows="3" placeholder="Code interphone, étage, commentaires..."></textarea>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>

            <label for="confirm_password">Confirmer le mot de passe</label>
            <input type="password" id="confirm_password" name="confirm_password" required>

            <br><br>
            <input type="submit" value="S'inscrire">

        </form>
    </section>

</main>
