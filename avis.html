<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Wok’in Dead - Avis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<header>
    <h1>Wok’in Dead — Donnez votre avis</h1>
    <nav>
        <a href="page d'acceuil.html">Accueil</a>
        <a href="profil.html">Profil</a>
        <a href="avis.html">Avis</a>
        <a href="connexion.html">Déconnexion</a>
    </nav>
</header>

<main>

    <div class="overlay">

        <section class="section">
            <h2>Votre avis compte 🧟‍♂️🍜</h2>

            <p class="accroche">
                Merci d’avoir commandé chez <strong>Wok’in Dead</strong> !
                Donnez-nous votre avis sur votre commande.
            </p>

            <form action="#" method="post">

                <label for="note-livraison">Note de la livraison</label>
                <select id="note-livraison" name="note-livraison" required>
                    <option value="">Choisissez une note</option>
                    <option>⭐</option>
                    <option>⭐⭐</option>
                    <option>⭐⭐⭐</option>
                    <option>⭐⭐⭐⭐</option>
                    <option>⭐⭐⭐⭐⭐</option>
                </select>

                <label for="note-plats">Note des plats</label>
                <select id="note-plats" name="note-plats" required>
                    <option value="">Choisissez une note</option>
                    <option>⭐</option>
                    <option>⭐⭐</option>
                    <option>⭐⭐⭐</option>
                    <option>⭐⭐⭐⭐</option>
                    <option>⭐⭐⭐⭐⭐</option>
                </select>

                <label for="commentaire">Commentaire</label>
                <textarea id="commentaire" name="commentaire" rows="5"
                          placeholder="Dites-nous ce que vous avez pensé de votre commande..."></textarea>

                <input type="submit" value="Envoyer mon avis">

            </form>
        </section>

    </div>

</main>

<footer>
    <p>© 2026 Wok’in Dead — Merci pour votre confiance</p>
</footer>

</body>
</html>
